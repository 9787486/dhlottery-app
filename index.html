<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0B1120" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="동행복권" />
  <title>동행복권 번호 생성기</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&family=Bebas+Neue&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0B1120; --bg2: #111827; --card: #1a2235; --border: #2a3a55;
      --text: #e8edf5; --sub: #7a8aaa; --accent: #4f8ef7; --accent2: #7c3aed;
      --gold: #facc15; --blue: #60a5fa; --red: #f87171; --gray: #94a3b8; --green: #4ade80;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { 
      background: var(--bg); color: var(--text); 
      font-family: 'Noto+Sans KR', sans-serif; 
      display: flex; justify-content: center; align-items: flex-start;
      min-height: 100vh; padding: 20px;
    }

    .app-container { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 20px; }

    .header { text-align: center; padding: 10px 0; }
    .header h1 { font-family: 'Bebas Neue', cursive; font-size: 2.8rem; letter-spacing: 2px; color: var(--accent); }
    .header p { color: var(--sub); font-size: 0.9rem; margin-top: -5px; }

    /* 공통 카드 스타일 */
    .card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 24px; padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      display: flex; flex-direction: column; gap: 20px;
    }

    .card-title { font-weight: 700; font-size: 1.1rem; color: var(--text); display: flex; align-items: center; gap: 8px; }
    .card-title span { font-size: 0.8rem; background: var(--border); padding: 2px 8px; border-radius: 6px; color: var(--sub); }

    /* 번호 출력 영역 (통일) */
    .result-area {
      min-height: 80px; display: flex; justify-content: center; align-items: center;
      background: rgba(0,0,0,0.2); border-radius: 16px; padding: 10px; gap: 8px; flex-wrap: wrap;
    }

    .ball {
      width: 42px; height: 42px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-family: 'JetBrains Mono', monospace;
      color: white; font-size: 1.1rem; box-shadow: inset 0 -3px 6px rgba(0,0,0,0.2);
      animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* 버튼 스타일 (통일) */
    .btn-main {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white; border: none; padding: 16px; border-radius: 16px;
      font-weight: 700; font-size: 1.1rem; cursor: pointer;
      transition: transform 0.2s;
    }
    .btn-main:active { transform: scale(0.98); }

    .btn-sub {
      background: var(--card); color: var(--sub); border: 1px solid var(--border);
      padding: 12px; border-radius: 14px; font-weight: 600; cursor: pointer;
    }

    /* 하단 안내 배너 */
    .banner {
      position: fixed; bottom: 20px; left: 20px; right: 20px; max-width: 410px; margin: 0 auto;
      background: var(--card); border: 1px solid var(--accent); padding: 16px;
      border-radius: 18px; z-index: 1000; display: flex; flex-direction: column; gap: 10px;
    }
    .hidden { display: none !important; }

  </style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h1>LOTTO & PENSION</h1>
    <p>동행복권 번호 생성기</p>
  </div>

  <div class="card">
    <div class="card-title">로또 6/45 <span>6개 추출 + 1개 중복보너스</span></div>
    <div id="lotto-result" class="result-area">
      <span style="color:var(--sub)">번호를 생성해 주세요</span>
    </div>
    <button class="btn-main" onclick="generateLotto()">로또 번호 생성</button>
  </div>

  <div class="card">
    <div class="card-title">연금복권 720+ <span>조 + 6자리</span></div>
    <div id="pension-result" class="result-area">
      <span style="color:var(--sub)">번호를 생성해 주세요</span>
    </div>
    <button class="btn-main" onclick="generatePension()">연금복권 생성</button>
  </div>

  <button class="btn-sub" onclick="openQR()">당첨 확인 (QR 스캔 이동)</button>

  <div id="installBanner" class="banner hidden">
    <p style="font-size:0.9rem">📱 앱으로 설치하면 더 편리합니다!</p>
    <div style="display:flex; gap:10px;">
      <button onclick="installApp()" style="flex:1; background:var(--accent); border:none; padding:10px; border-radius:10px; color:white; font-weight:700;">지금 설치</button>
      <button onclick="closeBanner()" style="background:var(--border); border:none; padding:10px; border-radius:10px; color:var(--text);">닫기</button>
    </div>
  </div>
</div>

<script>
  // 로또 색상 로직
  function getLottoColor(n) {
    if (n <= 10) return 'var(--gold)';
    if (n <= 20) return 'var(--blue)';
    if (n <= 30) return 'var(--red)';
    if (n <= 40) return 'var(--gray)';
    return 'var(--green)';
  }

  // 로또 생성 (요청하신 보너스 로직 포함)
  function generateLotto() {
    const res = document.getElementById('lotto-result');
    res.innerHTML = '';
    const nums = new Set();
    while(nums.size < 6) nums.add(Math.floor(Math.random() * 45) + 1);
    const sorted = Array.from(nums).sort((a,b) => a-b);
    
    // 보너스: 추출된 6개 중 하나
    const bonus = sorted[Math.floor(Math.random() * sorted.length)];

    sorted.forEach(n => {
      const b = document.createElement('div');
      b.className = 'ball';
      b.style.background = getLottoColor(n);
      b.textContent = n;
      res.appendChild(b);
    });
    
    // 보너스 번호 강조 (테두리 추가)
    const bBall = document.createElement('div');
    bBall.className = 'ball';
    bBall.style.border = '3px solid white';
    bBall.style.background = getLottoColor(bonus);
    bBall.textContent = bonus;
    res.appendChild(bBall);
  }

  // 연금복권 생성
  function generatePension() {
    const res = document.getElementById('pension-result');
    res.innerHTML = '';
    
    // 조 (1~5)
    const jo = Math.floor(Math.random() * 5) + 1;
    const joBall = document.createElement('div');
    joBall.className = 'ball';
    joBall.style.background = 'var(--accent2)';
    joBall.textContent = jo;
    res.appendChild(joBall);
    
    const divider = document.createElement('span');
    divider.textContent = '조';
    divider.style.color = 'var(--sub)';
    res.appendChild(divider);

    // 6자리 번호
    for(let i=0; i<6; i++) {
      const n = Math.floor(Math.random() * 10);
      const b = document.createElement('div');
      b.className = 'ball';
      b.style.background = 'var(--card)';
      b.style.border = '1px solid var(--border)';
      b.textContent = n;
      res.appendChild(b);
    }
  }

  // QR 이동
  function openQR() {
    if(confirm("동행복권 공식 QR 당첨확인 페이지로 이동하시겠습니까?")) {
      window.open("https://m.dhlottery.co.kr/qr.do?method=qrOrder", "_blank");
    }
  }

  // PWA 관련
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').classList.remove('hidden');
  });

  function installApp() {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      deferredPrompt = null;
      document.getElementById('installBanner').classList.add('hidden');
    } else {
      alert("브라우저 메뉴의 [홈 화면에 추가]를 이용해 주세요!");
    }
  }

  function closeBanner() { document.getElementById('installBanner').classList.add('hidden'); }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
</script>
</body>
</html>
